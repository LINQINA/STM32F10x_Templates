<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Total Flow Rate</title>
    <!-- 引入 ECharts 文件 -->
    <script src="ECharts/echarts-all.js"></script>
    <script src="ECharts/echarts.min.js"></script>
</head>
<body>
    <div id="totalFlowRate" style="width: 510px; height: 225px; "></div>
    <script type="text/javascript">
        var totalFlowRate = echarts.init(document.getElementById('totalFlowRate'));

        function resizeECharts(width, height) {
            // 设置ECharts图表容器的新大小
            var doc = document.getElementById('totalFlowRate');
            doc.style.width = width + 'px';
            doc.style.height = height + 'px';
            totalFlowRate.resize();
        }

        var xAxisData = [];
        var voltageData = [];
        var currentData = [];
        var voltageOutputData = [];
        var currentOutputData = [];
        function updateChart(data) {
            // Update data arrays
            xAxisData.push(data.xAxis);
            voltageData.push(data.inputVoltage);
            currentData.push(data.inputCurrent);
            voltageOutputData.push(data.outputVoltage);
            currentOutputData.push(data.outputCurrent);
            // Keep a maximum of 100 data points
            if (xAxisData.length > 32) {
                xAxisData.shift();
                voltageData.shift();
                currentData.shift();
                voltageOutputData.shift();
                currentOutputData.shift();
            }

            // 计算输入电压和输出电压的最大值
            var maxInputVoltage = Math.max.apply(null, voltageData);
            var maxOutputVoltage = Math.max.apply(null, voltageOutputData);
            var maxVoltage = Math.max(maxInputVoltage, maxOutputVoltage);

            // 计算输入电流和输出电流的最大值
            var maxInputCurrent = Math.max.apply(null, currentData);
            var maxOutputCurrent = Math.max.apply(null, currentOutputData);
            var maxCurrent = Math.max(maxInputCurrent, maxOutputCurrent);

            var totalFlowRateOption = {
                toolbox: {
                    feature: {
                        saveAsImage: {
                            title: '保存为图片',
                            pixelRatio: 2
                        },
                        dataZoom: {
                            title: {
                                zoom: '区域缩放',
                                back: '还原'
                            }
                        }
                    }
                },
                animation: false,
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    formatter: function (params) {
                        var tooltipContent = params[0].name + '<br>';
                        params.forEach(function (item) {
                            var value = item.value;
                            var unit = '';
                            switch (item.seriesName) {
                                case '输入电流':
                                case '输出电流':
                                    unit = 'A';
                                    break;
                                case '输入电压':
                                case '输出电压':
                                    unit = 'V';
                                    break;
                                // Add more cases if needed

                                default:
                                    break;
                            }
                            tooltipContent += item.seriesName + ': ' + value + unit + '<br>';
                        });
                        return tooltipContent;
                    },
                },
                legend: {
                    data: ['输入电压', '输出电压', '输入电流', '输出电流'],
                    textStyle: { color: "#66b3ff" }
                },
                grid: {
                    left: 50,
                    right: 50
                },
                xAxis: {
                    boundaryGap: true,
                    data: xAxisData,
                    splitLine: { show: true }
                },
                yAxis: [
                    {
                        type: 'value',
                        name: '电压（V）',
                        splitLine: { show: true },
                        axisLabel: {
                            formatter: function (value) {
                                return value + ' V';
                            }
                        },
                        min: 0,
                        max: Math.ceil(maxVoltage) < 8 ? 8 : Math.ceil(maxVoltage / 8) * 8,
                        interval: (Math.ceil(maxVoltage)) < 8 ? 1 : (Math.ceil(maxVoltage / 8) * 8)/8,
                        splitNumber: 8,
                        position: 'left'
                    },
                    {
                        type: 'value',
                        name: '电流（A）',
                        splitLine: { show: true },
                        axisLabel: {
                            formatter: function (value) {
                                return value + ' A';
                            }
                        },
                        min: 0,
                        max: Math.ceil(maxCurrent) < 8 ? 8 : Math.ceil(maxCurrent / 8) * 8,
                        interval: (Math.ceil(maxCurrent)) < 8 ? 1 : (Math.ceil(maxCurrent / 8) * 8) / 8,
                        splitNumber: 8,
                        position: 'right'
                    }
                ],
                series: [
                    {
                        name: data.isShowInputVolt == 1 ? '输入电压':'',
                        type: 'line',
                        yAxisIndex: 0,
                        data: data.isShowInputVolt==1 ? voltageData : [],
                        smooth: true
                    },
                    {
                        name: '输出电压',
                        type: 'line',
                        yAxisIndex: 0,
                        data: voltageOutputData,
                        smooth: true
                    },
                    {
                        name: data.isShowInputCurrent == 1?'输入电流':'',
                        type: 'line',
                        yAxisIndex: 1, // Use the second y-axis for '输入电流'
                        data: data.isShowInputCurrent==1 ? currentData :[],
                        smooth: true,
                        borderType: "dotted"
                    },
                    {
                        name: '输出电流',
                        type: 'line',
                        yAxisIndex: 1, // Use the second y-axis for '输出电流'
                        data: currentOutputData,
                        smooth: true,
                        borderType: "dotted"
                    }
                ]
            };
            totalFlowRate.setOption(totalFlowRateOption);
        }
    </script>
</body>
</html>
